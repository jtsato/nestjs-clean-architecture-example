name: Continuous Integration

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/mutation-testing.yml'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NodeJs [v20]
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g yarn
          yarn --ignore-scripts

      - if: false
        name: Checks for known security issues with the installed packages
        run: |
          yarn audit --groups dependencies

      - name: Run Unit tests with Coverage
        run: |
          yarn test:cov

      - name: Run End-to-End tests
        run: |
          yarn test:e2e

      - name: Verify SonarCloud token
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SONAR_TOKEN is empty. Add a SonarCloud token (Project → Administration → Analysis Method) under repository Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: SonarCloud Scan
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Environment Teardown
        if: always()
        run: |
          echo "Finished!"
